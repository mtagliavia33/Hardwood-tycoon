name: Diagnose Railway
on:
  workflow_dispatch:

jobs:
  diag:
    runs-on: ubuntu-latest
    steps:
      - name: Check Railway deployment
        run: |
          base=https://hardwood-tycoon.up.railway.app
          echo "ping:";    curl -s --max-time 15 "$base/api/ping"; echo
          echo "root:";    curl -s --max-time 15 "$base/" | head -c 120; echo
          echo "players (wrong key => 401 means ADMIN_KEY is set; 503 means it is missing):"
          curl -s --max-time 15 -o /dev/null -w "%{http_code}\n" "$base/api/players" -H 'x-admin-key: definitely-wrong'
